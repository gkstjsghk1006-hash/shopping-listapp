<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쇼핑 리스트</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
      min-height: 100vh;
    }

    .container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 32px;
      width: 100%;
      max-width: 480px;
      height: fit-content;
    }

    h1 {
      font-size: 1.6rem;
      color: #1a202c;
      margin-bottom: 24px;
      text-align: center;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus {
      border-color: #667eea;
    }

    .input-row button {
      padding: 12px 20px;
      background: #667eea;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .input-row button:hover {
      background: #5a67d8;
    }

    .stats {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      color: #718096;
      margin-bottom: 16px;
      padding: 0 4px;
    }

    .clear-btn {
      background: none;
      border: none;
      color: #e53e3e;
      cursor: pointer;
      font-size: 0.85rem;
      padding: 0;
    }

    .clear-btn:hover {
      text-decoration: underline;
    }

    ul {
      list-style: none;
    }

    li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 12px;
      border-radius: 10px;
      margin-bottom: 8px;
      background: #f7fafc;
      transition: background 0.2s;
    }

    li:hover {
      background: #edf2f7;
    }

    li.checked {
      background: #f0fff4;
    }

    li input[type="checkbox"] {
      width: 20px;
      height: 20px;
      accent-color: #48bb78;
      cursor: pointer;
      flex-shrink: 0;
    }

    li .item-text {
      flex: 1;
      font-size: 1rem;
      color: #2d3748;
      transition: color 0.2s;
    }

    li.checked .item-text {
      text-decoration: line-through;
      color: #a0aec0;
    }

    li .delete-btn {
      background: none;
      border: none;
      color: #cbd5e0;
      cursor: pointer;
      font-size: 1.2rem;
      line-height: 1;
      padding: 4px;
      border-radius: 6px;
      transition: color 0.2s, background 0.2s;
    }

    li .delete-btn:hover {
      color: #e53e3e;
      background: #fed7d7;
    }

    .empty {
      text-align: center;
      color: #a0aec0;
      padding: 40px 0;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🛒 쇼핑 리스트</h1>

    <div class="input-row">
      <input type="text" id="itemInput" placeholder="아이템 입력..." />
      <button id="addBtn">추가</button>
    </div>

    <div class="stats">
      <span id="statsText">항목 없음</span>
      <button class="clear-btn" id="clearBtn">완료 항목 삭제</button>
    </div>

    <ul id="list"></ul>
    <div class="empty" id="emptyMsg">리스트가 비어 있습니다.</div>
  </div>

  <script>
    let items = JSON.parse(localStorage.getItem('shopping-list') || '[]');

    function save() {
      localStorage.setItem('shopping-list', JSON.stringify(items));
    }

    function render() {
      const list = document.getElementById('list');
      const emptyMsg = document.getElementById('emptyMsg');
      const statsText = document.getElementById('statsText');

      list.innerHTML = '';

      if (items.length === 0) {
        emptyMsg.style.display = 'block';
        statsText.textContent = '항목 없음';
        return;
      }

      emptyMsg.style.display = 'none';
      const checkedCount = items.filter(i => i.checked).length;
      statsText.textContent = `총 ${items.length}개 · 완료 ${checkedCount}개`;

      items.forEach((item, idx) => {
        const li = document.createElement('li');
        if (item.checked) li.classList.add('checked');

        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.checked = item.checked;
        checkbox.addEventListener('change', () => toggle(idx));

        const span = document.createElement('span');
        span.className = 'item-text';
        span.textContent = item.text;

        const delBtn = document.createElement('button');
        delBtn.className = 'delete-btn';
        delBtn.title = '삭제';
        delBtn.textContent = '✕';
        delBtn.addEventListener('click', () => deleteItem(idx));

        li.appendChild(checkbox);
        li.appendChild(span);
        li.appendChild(delBtn);
        list.appendChild(li);
      });
    }

    function addItem() {
      const input = document.getElementById('itemInput');
      const text = input.value.trim();
      if (!text) return;
      items.push({ text, checked: false });
      save();
      render();
      input.value = '';
      input.focus();
    }

    function toggle(idx) {
      items[idx].checked = !items[idx].checked;
      save();
      render();
    }

    function deleteItem(idx) {
      items.splice(idx, 1);
      save();
      render();
    }

    document.getElementById('addBtn').addEventListener('click', addItem);
    document.getElementById('clearBtn').addEventListener('click', () => {
      items = items.filter(i => !i.checked);
      save();
      render();
    });
    document.getElementById('itemInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') addItem();
    });

    render();
  </script>
</body>
</html>
